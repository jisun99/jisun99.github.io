    }

    html {

    }

      line-height: 1.7;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .container {

      margin: 0 auto;
    }

    .section {
      padding: 88px 0;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: clamp(1.9rem, 3vw, 2.7rem);

      line-height: 1.2;

    }

      color: var(--text-soft);

    }

    .grid {
      display: grid;
      gap: 22px;

    }

      color: var(--text-soft);
      font-weight: 600;

    .hero {

    }

      background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(245,246,245,0.96));
      border: 1px solid rgba(226, 229, 225, 0.95);
      box-shadow: var(--shadow);
    }

      line-height: 1.05;
      letter-spacing: -0.04em;

      color: var(--text-soft);
      font-size: 1.05rem;
      max-width: 720px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 20px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      color: white;
      font-weight: 700;
      box-shadow: 0 12px 28px rgba(79, 137, 59, 0.22);
